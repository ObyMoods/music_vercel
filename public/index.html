<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1DB954">
    <title>Xyroo Music Player</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">
            <div class="login-card">
                <div class="login-logo">
                    <svg viewBox="0 0 24 24" fill="#1DB954" width="64" height="64">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                    </svg>
                    <h1>Music Player</h1>
                    <p>Dengarkan musik favoritmu dari Spotify</p>
                </div>
                <button class="login-btn" id="loginBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                    </svg>
                    Login dengan Spotify
                </button>
            </div>
        </div>

        <!-- Main App -->
        <div class="main-app" id="mainApp" style="display: none;">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="icon-btn" id="menuBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="header-center">
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="#1DB954" width="24" height="24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                        </svg>
                        <span>SPOTIFY</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="searchBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </button>
                    <button class="user-avatar" id="userBtn">
                        <img id="userAvatar" src="" alt="User">
                    </button>
                </div>
            </header>

            <!-- Main Content -->
            <main class="main-content" id="mainContent">
                <!-- Beranda Page -->
                <div class="page active" id="homePage">
                    <div class="welcome-card">
                        <h1 id="welcomeName">Selamat Datang</h1>
                        <p>Dengarkan musik favoritmu</p>
                    </div>

                    <div class="section-header">
                        <h2>Top Lagu Minggu Ini</h2>
                    </div>
                    <div class="horizontal-scroll" id="topTracks"></div>

                    <div class="section-header">
                        <h2>Playlist Rekomendasi</h2>
                    </div>
                    <div class="horizontal-scroll" id="featuredPlaylists"></div>

                    <div class="section-header">
                        <h2>Artis Populer</h2>
                    </div>
                    <div class="horizontal-scroll" id="topArtists"></div>
                </div>

                <!-- Search Page -->
                <div class="page" id="searchPage">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Cari lagu, artis, album...">
                    </div>
                    <div class="search-results" id="searchResults"></div>
                </div>

                <!-- Playlist Page -->
                <div class="page" id="playlistPage">
                    <div class="library-header">
                        <h2>Playlist Saya</h2>
                    </div>
                    <div class="playlist-grid" id="userPlaylists"></div>
                </div>

                <!-- Profile Page -->
                <div class="page" id="profilePage">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <img id="profileAvatar" src="" alt="Profile">
                        </div>
                        <h2 id="profileName">User</h2>
                        <p id="profileEmail">email@example.com</p>
                        <p id="profileFollowers">Followers: 0</p>
                    </div>
                    <div class="profile-menu">
                        <div class="profile-item" id="logoutBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            <span>Logout</span>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="nav-item active" data-page="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/>
                    </svg>
                    <span>Beranda</span>
                </button>
                <button class="nav-item" data-page="search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <span>Cari</span>
                </button>
                <button class="nav-item" data-page="playlist">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span>Playlist</span>
                </button>
                <button class="nav-item" data-page="profile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span>Profil</span>
                </button>
            </nav>

            <!-- Mini Player -->
            <footer class="mini-player" id="miniPlayer" style="display: none;">
                <div class="mini-player-left" id="openFullPlayer">
                    <img id="miniCover" src="" alt="cover">
                    <div class="mini-info">
                        <div id="miniTitle">Pilih Lagu</div>
                        <div id="miniArtist">-</div>
                    </div>
                </div>
                <div class="mini-player-center">
                    <button id="miniPrevBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <polygon points="19 20 9 12 19 4 19 20"/>
                            <line x1="5" y1="4" x2="5" y2="20"/>
                        </svg>
                    </button>
                    <button id="miniPlayPauseBtn" class="mini-play">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                    </button>
                    <button id="miniNextBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <polygon points="5 4 15 12 5 20 5 4"/>
                            <line x1="19" y1="5" x2="19" y2="19"/>
                        </svg>
                    </button>
                </div>
                <div class="mini-player-right">
                    <button id="miniVolumeBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        </svg>
                    </button>
                </div>
            </footer>

            <!-- Full Player -->
            <div class="full-player" id="fullPlayer">
                <button class="close-player" id="closePlayerBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <div class="full-player-art">
                    <img id="fullCover" src="" alt="cover">
                </div>
                <div class="full-player-info">
                    <h2 id="fullTitle">-</h2>
                    <p id="fullArtist">-</p>
                </div>
                <div class="full-player-controls">
                    <div class="progress-area">
                        <span id="fullCurrentTime">0:00</span>
                        <div class="progress-track" id="fullProgressBar">
                            <div class="progress-fill" id="fullProgressFill"></div>
                        </div>
                        <span id="fullTotalTime">0:00</span>
                    </div>
                    <div class="control-buttons">
                        <button id="fullShuffleBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                                <polyline points="16 3 21 3 21 8"/>
                                <line x1="4" y1="20" x2="21" y2="3"/>
                                <polyline points="21 16 21 21 16 21"/>
                                <line x1="15" y1="15" x2="21" y2="21"/>
                                <line x1="4" y1="4" x2="9" y2="9"/>
                            </svg>
                        </button>
                        <button id="fullPrevBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
                                <polygon points="19 20 9 12 19 4 19 20"/>
                                <line x1="5" y1="4" x2="5" y2="20"/>
                            </svg>
                        </button>
                        <button id="fullPlayPauseBtn" class="full-play">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </button>
                        <button id="fullNextBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
                                <polygon points="5 4 15 12 5 20 5 4"/>
                                <line x1="19" y1="5" x2="19" y2="19"/>
                            </svg>
                        </button>
                        <button id="fullRepeatBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                                <polyline points="17 1 21 5 17 9"/>
                                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                                <polyline points="7 23 3 19 7 15"/>
                                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="volume-control">
                        <button id="fullVolumeBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                            </svg>
                        </button>
                        <input type="range" id="fullVolumeSlider" min="0" max="1" step="0.01" value="0.7">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>
    <script src="/js/app.js"></script>
</body>
</html>

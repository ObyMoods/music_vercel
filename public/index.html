<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1DB954">
    <title>Xyroo Music Player</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="icon-btn" id="menuBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="header-center">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="#1DB954" width="24" height="24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                    </svg>
                    <span>XYROO</span>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="searchBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Beranda Page -->
            <div class="page active" id="homePage">
                <div class="welcome-card">
                    <h1>Selamat Datang</h1>
                    <p>Dengarkan lagu favoritmu dari Xyroo</p>
                </div>

                <div class="section-header">
                    <h2>Playlist Pilihan</h2>
                </div>
                <div class="playlists-grid" id="playlistsGrid"></div>

                <div class="section-header">
                    <h2>Trending Now</h2>
                </div>
                <div class="horizontal-scroll" id="trendingTracks"></div>
            </div>

            <!-- Playlist Detail Page -->
            <div class="page" id="playlistDetailPage">
                <div class="playlist-header-large" id="playlistHeader"></div>
                <div class="tracklist" id="playlistTracks"></div>
            </div>

            <!-- Search Page -->
            <div class="page" id="searchPage">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Cari lagu, artis, album...">
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>

            <!-- Profile Page -->
            <div class="page" id="profilePage">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="60" height="60">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <h2>Music Player</h2>
                </div>
                <div class="profile-menu">
                    <div class="profile-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span>About</span>
                    </div>
                    <div class="profile-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                        </svg>
                        <span>Powered by Xyroo</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/>
                </svg>
                <span>Beranda</span>
            </button>
            <button class="nav-item" data-page="search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <span>Cari</span>
            </button>
            <button class="nav-item" data-page="profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Info</span>
            </button>
        </nav>

        <!-- Mini Player -->
        <footer class="mini-player" id="miniPlayer" style="display: none;">
            <div class="mini-player-left" id="openFullPlayer">
                <img id="miniCover" src="" alt="cover">
                <div class="mini-info">
                    <div id="miniTitle">Pilih Lagu</div>
                    <div id="miniArtist">-</div>
                </div>
            </div>
            <div class="mini-player-center">
                <button id="miniPrevBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <polygon points="19 20 9 12 19 4 19 20"/>
                        <line x1="5" y1="4" x2="5" y2="20"/>
                    </svg>
                </button>
                <button id="miniPlayPauseBtn" class="mini-play">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                </button>
                <button id="miniNextBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <polygon points="5 4 15 12 5 20 5 4"/>
                        <line x1="19" y1="5" x2="19" y2="19"/>
                    </svg>
                </button>
            </div>
            <div class="mini-player-right">
                <button id="miniVolumeBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    </svg>
                </button>
            </div>
        </footer>

        <!-- Full Player -->
        <div class="full-player" id="fullPlayer">
            <button class="close-player" id="closePlayerBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="full-player-art">
                <img id="fullCover" src="" alt="cover">
            </div>
            <div class="full-player-info">
                <h2 id="fullTitle">-</h2>
                <p id="fullArtist">-</p>
            </div>
            <div class="full-player-controls">
                <div class="progress-area">
                    <span id="fullCurrentTime">0:00</span>
                    <div class="progress-track" id="fullProgressBar">
                        <div class="progress-fill" id="fullProgressFill"></div>
                    </div>
                    <span id="fullTotalTime">0:00</span>
                </div>
                <div class="control-buttons">
                    <button id="fullPrevBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
                            <polygon points="19 20 9 12 19 4 19 20"/>
                            <line x1="5" y1="4" x2="5" y2="20"/>
                        </svg>
                    </button>
                    <button id="fullPlayPauseBtn" class="full-play">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                    </button>
                    <button id="fullNextBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
                            <polygon points="5 4 15 12 5 20 5 4"/>
                            <line x1="19" y1="5" x2="19" y2="19"/>
                        </svg>
                    </button>
                </div>
                <div class="volume-control">
                    <button id="fullVolumeBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        </svg>
                    </button>
                    <input type="range" id="fullVolumeSlider" min="0" max="1" step="0.01" value="0.7">
                </div>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>
    <script src="/js/app.js"></script>
</body>
</html>
